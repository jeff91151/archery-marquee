<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>射箭比賽成績查詢 - 敬老清晰版</title>
  <style>
    :root {
      /* 調深顏色以增加對比度，方便長輩閱讀 */
      --primary-color: #4e342e; 
      --secondary-color: #bcaaa4;
      --bg-color: #f0f4f3;
      --text-main: #212121;
    }
    body {
      margin: 0; padding: 0;
      font-family: "Microsoft JhengHei", -apple-system, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      /* 讓整體字體基數變大 */
      font-size: 18px; 
    }
    
    header {
      background: #fff;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
      position: sticky; top: 0; z-index: 100;
    }
    .header-content {
      display: flex; align-items: center; justify-content: center;
      padding: 15px 15px 10px 15px; gap: 15px;
    }
    .header-logo { height: 65px; width: auto; } /* Logo 加大 */
    .header-title { margin: 0; color: var(--primary-color); font-size: 28px; font-weight: 900; }
    
    .tabs-container {
      display: flex; overflow-x: auto; white-space: nowrap;
      padding: 12px 15px; gap: 12px; scrollbar-width: none;
    }
    .tabs-container::-webkit-scrollbar { display: none; }
    
    /* 頁籤按鈕加大加粗 */
    .tab-btn {
      background: #e0e0e0; border: none; padding: 12px 22px;
      border-radius: 28px; font-size: 20px; cursor: pointer;
      transition: 0.3s; font-weight: 900; color: #444;
    }
    .tab-btn.active {
      background: var(--primary-color); color: #fff;
      box-shadow: 0 4px 10px rgba(78, 52, 46, 0.4);
    }

    .content-area { padding: 20px 15px; max-width: 1200px; margin: 0 auto; }

    .controls-area { display: flex; gap: 12px; margin-bottom: 25px; }
    
    /* 搜尋框加大 */
    .search-box {
      flex-grow: 1; padding: 15px 20px; border: 3px solid var(--secondary-color);
      border-radius: 12px; font-size: 22px; box-sizing: border-box;
      outline: none; transition: border-color 0.3s;
    }
    .search-box:focus { border-color: var(--primary-color); }
    
    /* 更新按鈕加大 */
    .refresh-btn {
      background: #fff; border: 3px solid var(--primary-color); color: var(--primary-color);
      border-radius: 12px; padding: 0 20px; font-size: 20px; font-weight: 900;
      cursor: pointer; transition: 0.3s; white-space: nowrap;
    }
    .refresh-btn:hover { background: var(--primary-color); color: #fff; }

    #status-msg { text-align: center; color: #666; font-size: 22px; margin-top: 50px; display: none; font-weight: bold;}

    .rank-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
    }

    /* 成績卡片高度加高，字體加大 */
    .rank-card {
      background: #fff; border-radius: 15px; padding: 22px; display: flex; align-items: center; 
      cursor: pointer; box-shadow: 0 3px 8px rgba(0,0,0,0.1); border-left: 8px solid #ddd;
      transition: transform 0.2s;
    }
    
    .rank-num { font-size: 36px; font-weight: 900; color: #888; width: 60px; text-align: center; margin-right: 20px; }
    .rank-info { flex-grow: 1; }
    .rank-name { font-size: 26px; font-weight: 900; margin-bottom: 6px; color: #000;}
    .rank-score { font-size: 20px; color: #444; font-weight: bold; }
    
    .rank-1 { border-left-color: #FFD700; background: #FFFDF0; }
    .rank-1 .rank-num { color: #d4af37; font-size: 42px; }
    .rank-2 { border-left-color: #C0C0C0; background: #F8F8F8; }
    .rank-2 .rank-num { color: #8a8a8a; font-size: 38px; }
    .rank-3 { border-left-color: #CD7F32; background: #FFF6F0; }
    .rank-3 .rank-num { color: #a0522d; font-size: 38px; }

    /* 高亮色彩加深 */
    .highlight { background-color: #ffeb3b; color: #bf360c; padding: 0 4px; border-radius: 4px; }

    /* 骨架屏 */
    .shimmer-box {
      background: #e0e0e0;
      background-image: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite linear; border-radius: 6px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skel-num { width: 45px; height: 45px; margin: 0 auto; }
    .skel-line1 { width: 70%; height: 28px; margin-bottom: 10px; }
    .skel-line2 { width: 50%; height: 22px; }

    /* 回到頂部按鈕 (SVG 版本) */
    #back-to-top {
      position: fixed; bottom: 35px; right: 30px; z-index: 99;
      background-color: var(--primary-color); border: none;
      width: 65px; height: 65px; border-radius: 50%;
      cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center;
      -webkit-appearance: none;
    }

    /* 詳細成績 Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.75); display: none;
      justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-content {
      background: #fff; width: 95%; max-width: 600px;
      border-radius: 18px; padding: 25px; box-sizing: border-box; max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; border-bottom: 3px solid #eee; padding-bottom: 12px;
    }
    .modal-title { margin: 0; font-size: 28px; color: var(--primary-color); font-weight: 900; }
    .close-btn { font-size: 45px; color: #666; border: none; background: none; cursor: pointer; }
    
    .detail-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 18px; font-weight: bold;}
    .detail-table th, .detail-table td { border: 2px solid #bbb; padding: 12px 5px; text-align: center; }
    .detail-table th { background: #eee; color: #333; font-size: 16px; }
    .round-title { font-weight: 900; background: #e3f2fd; color: #1565c0; text-align: left !important; padding-left: 12px !important;}
    
    .total-score-box { text-align: right; margin-top: 20px; font-size: 24px; font-weight: 900; }
    .total-score-val { color: #d32f2f; font-size: 36px; border-bottom: 4px solid #d32f2f; }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <img src="射箭_logo_2.png" alt="協會Logo" class="header-logo">
    <h1 class="header-title">射箭成績查詢</h1>
  </div>
  <div class="tabs-container" id="tabs"></div>
</header>

<div class="content-area">
  <div class="controls-area">
    <input type="text" id="search-input" class="search-box" placeholder="🔍 打名字找人...">
    <button id="refresh-btn" class="refresh-btn" onclick="refreshCurrentData()">🔄 更新</button>
  </div>
  
  <div id="status-msg"></div>
  <div id="rank-container" class="rank-grid"></div>
</div>

<button id="back-to-top" onclick="scrollToTop()">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"></polyline>
  </svg>
</button>

<div class="modal-overlay" id="detail-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-name">詳細成績</h3>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div id="modal-body">
      載入中...
    </div>
  </div>
</div>

<script>
// ⚠️ 保持你的 GAS URL 不變
const baseURL = "https://script.google.com/macros/s/AKfycbzmBdB-IvDzS2U4VBnnYO1aup-xXdEQqMkfMkChzClYiBE2kk30Yt8nTyQey8ZW5blK/exec";

const sheets = [
  "計算_原住民傳統弓_男", "計算_原住民傳統弓_女",
  "計算_傳統弓_男", "計算_傳統弓_女",
  "計算_國小", "計算_國中",
  "計算_決賽_原住民傳統弓_男", "計算_決賽_原住民傳統弓_女"
];

let currentData = []; 
let currentSheet = ""; 

function init() {
  const tabsDiv = document.getElementById("tabs");
  sheets.forEach((sheetName) => {
    const displayName = sheetName.replace("計算_", ""); 
    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.textContent = displayName;
    btn.onclick = () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentSheet = sheetName;
      document.getElementById("search-input").value = ""; 
      loadData(sheetName);
    };
    tabsDiv.appendChild(btn);
  });

  if (tabsDiv.firstChild) tabsDiv.firstChild.click();

  document.getElementById("search-input").addEventListener("input", function(e) {
    const keyword = e.target.value.trim();
    if (keyword === "") {
      renderCards(currentData);
    } else {
      renderCards(currentData.filter(item => item.name.toLowerCase().includes(keyword.toLowerCase())), keyword); 
    }
  });

  window.addEventListener('scroll', function() {
    const topBtn = document.getElementById('back-to-top');
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
      topBtn.style.display = "flex"; 
    } else {
      topBtn.style.display = "none";
    }
  });
}

function refreshCurrentData() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true; btn.textContent = "⏳...";
  loadData(currentSheet).finally(() => {
    btn.disabled = false; btn.textContent = "🔄 更新";
  });
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderSkeleton() {
  const container = document.getElementById("rank-container");
  container.innerHTML = "";
  for(let i=0; i<6; i++) {
    container.innerHTML += `
      <div class="rank-card skeleton-card">
        <div class="rank-num"><div class="shimmer-box skel-num"></div></div>
        <div class="rank-info">
          <div class="shimmer-box skel-line1"></div>
          <div class="shimmer-box skel-line2"></div>
        </div>
      </div>`;
  }
}

async function loadData(sheetName) {
  const statusMsg = document.getElementById("status-msg");
  statusMsg.style.display = "none";
  renderSkeleton();
  try {
    const url = `${baseURL}?sheet=${encodeURIComponent(sheetName)}`;
    const response = await fetch(url);
    currentData = await response.json(); 
    if (currentData.length === 0) {
      document.getElementById("rank-container").innerHTML = "";
      statusMsg.style.display = "block";
      statusMsg.textContent = "📭 目前還沒有成績喔！";
      return;
    }
    renderCards(currentData);
  } catch (error) {
    document.getElementById("rank-container").innerHTML = "";
    statusMsg.style.display = "block";
    statusMsg.textContent = "❌ 資料載入失敗";
  }
}

function renderCards(dataArray, keyword = "") {
  const container = document.getElementById("rank-container");
  container.innerHTML = "";
  if (dataArray.length === 0) {
    container.innerHTML = "<div style='grid-column: 1 / -1; text-align: center; padding: 40px; font-size: 24px; color: #888;'>找不到這位選手</div>";
    return;
  }
  dataArray.forEach(item => {
    const card = document.createElement("div");
    card.className = "rank-card";
    if (item.rank == 1) card.classList.add("rank-1");
    else if (item.rank == 2) card.classList.add("rank-2");
    else if (item.rank == 3) card.classList.add("rank-3");

    let displayName = item.name;
    if (keyword !== "") {
      const regex = new RegExp(`(${keyword})`, 'gi');
      displayName = item.name.replace(regex, `<span class="highlight">$1</span>`);
    }

    card.innerHTML = `
      <div class="rank-num">${item.rank}</div>
      <div class="rank-info">
        <div class="rank-name">${displayName}</div>
        <div class="rank-score">總分：${item.score} 分</div>
      </div>`;
    card.onclick = () => fetchPlayerDetail(currentSheet, item.name);
    container.appendChild(card);
  });
}

async function fetchPlayerDetail(groupName, playerName) {
  const modal = document.getElementById("detail-modal");
  const modalBody = document.getElementById("modal-body");
  document.getElementById("modal-name").textContent = playerName + " 的成績單";
  modalBody.innerHTML = "<div style='text-align:center; padding: 30px; font-size:24px;'>⏳ 正在尋找成績...</div>";
  modal.style.display = "flex";
  try {
    const url = `${baseURL}?action=detail&group=${encodeURIComponent(groupName)}&name=${encodeURIComponent(playerName)}`;
    const response = await fetch(url);
    const detail = await response.json();
    if (detail.error) {
      modalBody.innerHTML = `<div style='text-align:center; color:red; padding: 20px; font-size:22px;'>❌ ${detail.error}</div>`;
      return;
    }
    let html = `<table class="detail-table">
                  <tr><th>靶數</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>小計</th></tr>`;
    let totalSum = 0;
    detail.scores.forEach((roundScores, index) => {
      let roundSum = 0;
      let tdHtml = "";
      roundScores.forEach(score => {
        let val = Number(score) || 0; roundSum += val;
        tdHtml += `<td>${score !== "" ? score : "-"}</td>`;
      });
      totalSum += roundSum;
      html += `<tr><td class="round-title">第 ${index + 1} 局</td>${tdHtml}<td style="color:var(--primary-color);">${roundSum}</td></tr>`;
    });
    html += `</table><div class="total-score-box">總成績：<span class="total-score-val">${totalSum}</span> 分</div>`;
    modalBody.innerHTML = html;
  } catch (error) {
    modalBody.innerHTML = "<div style='text-align:center; color:red; font-size:22px;'>❌ 載入失敗</div>";
  }
}

function closeModal() { document.getElementById("detail-modal").style.display = "none"; }
window.onclick = (e) => { if (e.target == document.getElementById("detail-modal")) closeModal(); }
init();
</script>
</body>
</html>
